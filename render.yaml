services:
  - type: web
    name: wasteai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: WASTEAI_DATA_DIR
        value: /var/data/wasteai
      - key: CORS_ORIGINS
        sync: false
      - key: WASTEAI_ADMIN_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_STARTTLS
        value: "true"
    disk:
      name: wasteai-data
      mountPath: /var/data
      sizeGB: 5

  - type: static_site
    name: wasteai-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false
